<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Government Work Website</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>Letter Box</h1>
        </header>
        <section id="introduction">
            <div class="intro-content">
                <h2>Welcome to Letter Box</h2>
                <p>This website aims to provide information about ongoing government projects and budget allocations. Stay updated with the latest initiatives and allocations in various sectors.</p>
            </div>
        </section>
        <section id="government-work">
            <h2 class="section-heading">Government Work</h2>
            <div id="work-list" class="work-list">
                <!-- Government work will be displayed here dynamically -->
            </div>
        </section>
        <section id="budget">
            <h2 class="section-heading">Budget</h2>
            <div id="budget-details" class="budget-details">
                <!-- Budget details will be displayed here dynamically -->
            </div>
        </section>
        <footer>
            <p>&copy; 2024 Government Work Website</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
